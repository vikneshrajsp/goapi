openapi: 3.0.3
info:
  title: goapi
  version: 1.0.0
  description: Coin balance API with auth, health, and metrics endpoints.
servers:
  - url: http://localhost:8080
paths:
  /ping:
    get:
      summary: Liveness endpoint
      responses:
        "200":
          description: pong
          content:
            text/plain:
              schema:
                type: string
                example: pong
  /health:
    get:
      summary: Readiness endpoint
      responses:
        "200":
          description: ok
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /account/coins:
    get:
      summary: Get coin balance for a user
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current coin balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinBalanceResponse"
        "400":
          description: Bad request / unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update coin balance for a user
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoinBalanceRequest"
      responses:
        "200":
          description: Updated coin balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCoinBalanceResponse"
        "400":
          description: Bad request / unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /metrics:
    get:
      summary: Prometheus metrics endpoint
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    CoinBalanceResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        balance:
          type: integer
          format: int64
          example: 100
      required: [code, balance]
    UpdateCoinBalanceRequest:
      type: object
      properties:
        balance:
          type: integer
          format: int64
          example: 150
      required: [balance]
    UpdateCoinBalanceResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        username:
          type: string
          example: alex
        balance:
          type: integer
          format: int64
          example: 150
      required: [code, username, balance]
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: bad request
      required: [code, message]
