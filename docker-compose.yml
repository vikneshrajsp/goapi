services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic coinbalance_change --partitions 3 --replication-factor 1"
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: goapi
      POSTGRES_PASSWORD: goapi
      POSTGRES_DB: goapi
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goapi -d goapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://goapi:goapi@postgres:5432/goapi?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  goapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: goapi:local
    container_name: goapi
    environment:
      APP_ENV: production
      LOG_LEVEL: info
      GOAPI_DB_DRIVER: postgres
      DATABASE_URL: postgres://goapi:goapi@postgres:5432/goapi?sslmode=disable
      OTEL_SERVICE_NAME: goapi
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER_ARG: "1.0"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_COINBALANCE: coinbalance_change
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  coinbalance-notifier:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        APP_PKG: ./cmd/coinbalance-notifier
    image: goapi-notifier:local
    container_name: coinbalance_notifier
    environment:
      APP_ENV: production
      LOG_LEVEL: info
      GOAPI_DB_DRIVER: postgres
      DATABASE_URL: postgres://goapi:goapi@postgres:5432/goapi?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_COINBALANCE: coinbalance_change
      OTEL_SERVICE_NAME: coinbalance-notifier
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER_ARG: "1.0"
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  coinbalance-metrics:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        APP_PKG: ./cmd/coinbalance-metrics
    image: goapi-event-metrics:local
    container_name: coinbalance_metrics
    environment:
      APP_ENV: production
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_COINBALANCE: coinbalance_change
      OTEL_SERVICE_NAME: coinbalance-metrics
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER_ARG: "1.0"
    ports:
      - "8092:8092"
    depends_on:
      jaeger:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      # Allow POST /-/reload after scrape config edits (curl -X POST localhost:9090/-/reload).
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      postgres_exporter:
        condition: service_started
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./deploy/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: promtail
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./deploy/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./deploy/grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
      - postgres_exporter
    restart: unless-stopped

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  loki-data:
