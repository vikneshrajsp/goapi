global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "goapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["goapi:8080"]

  - job_name: "postgres"
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: "coinbalance-metrics"
    metrics_path: /metrics
    static_configs:
      - targets: ["coinbalance-metrics:8092"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
